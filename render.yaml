services:
  - type: web
    name: goal-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: VAPID_PUBLIC_KEY
        sync: false   # set manually in Render dashboard
      - key: VAPID_PRIVATE_KEY
        sync: false   # set manually in Render dashboard
    disk:
      name: goaldb
      mountPath: /data
      sizeGB: 1
